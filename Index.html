<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EduSistema Pro v5</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --nv:#0b1e33;--nv2:#112940;--nv3:#1a3a5c;
  --bl:#1e5fa8;--bl2:#2d74c8;--bl3:#3b82f6;
  --tl:#0ea5a0;--sl:#445566;--sl2:#6b7a8d;--sl3:#94a3b8;
  --bd:#d8e2ef;--bg:#eef2f7;--bg2:#f5f8fc;--wh:#fff;--tx:#1a2535;
  --red:#e53e3e;--rbg:#fff5f5;--ora:#ed8936;--obg:#fffaf0;
  --grn:#38a169;--gbg:#f0fff4;--nsc:#2b6cb0;--nsbg:#ebf8ff;
  --r:10px;--rl:16px;--rxl:22px;
  --sh:0 1px 4px rgba(11,30,51,.08);--shm:0 4px 14px rgba(11,30,51,.12);
  --fn:'Outfit',sans-serif;--mn:'JetBrains Mono',monospace;--sw:258px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;overflow:hidden}
input,select,textarea,button{font-family:var(--fn)}
.hidden{display:none!important}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* LOGIN */
#ls{position:fixed;inset:0;z-index:9999;
  background:linear-gradient(145deg,var(--nv) 0%,var(--nv3) 55%,#1a4a7a 100%);
  display:flex;align-items:center;justify-content:center;padding:20px}
#ls::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 75% 25%,rgba(14,165,160,.12) 0%,transparent 70%),
             radial-gradient(ellipse 50% 60% at 15% 75%,rgba(59,130,246,.09) 0%,transparent 65%)}
.lgw{position:relative;z-index:1;display:grid;grid-template-columns:1fr 400px;gap:60px;width:100%;max-width:920px}
@media(max-width:750px){.lgw{grid-template-columns:1fr}.lgh{display:none}}
.lgh{display:flex;flex-direction:column;justify-content:center;color:#fff}
.lgm{width:68px;height:68px;border-radius:18px;margin-bottom:28px;
  background:linear-gradient(135deg,var(--tl),var(--bl3));
  display:flex;align-items:center;justify-content:center;font-size:30px;
  box-shadow:0 8px 28px rgba(14,165,160,.35)}
.lgh h1{font-size:38px;font-weight:900;line-height:1.1;letter-spacing:-.5px}
.lgh h1 em{font-style:normal;color:var(--tl)}
.lgh p{font-size:14px;color:rgba(255,255,255,.55);line-height:1.7;margin-top:14px;max-width:320px}
.lgr{display:flex;gap:10px;margin-top:32px;flex-wrap:wrap}
.lgc{padding:7px 16px;border-radius:40px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.lgc.a{background:rgba(245,158,11,.18);border:1px solid rgba(245,158,11,.35);color:#fbbf24}
.lgc.p{background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.35);color:#93c5fd}
.lgc.e{background:rgba(14,165,160,.18);border:1px solid rgba(14,165,160,.35);color:#5eead4}
.lgc2{background:rgba(255,255,255,.97);border-radius:var(--rxl);padding:44px 36px;
  box-shadow:0 28px 72px rgba(0,0,0,.32)}
.lgc2 h2{font-size:24px;font-weight:900;color:var(--nv);letter-spacing:-.3px}
.lgc2 .sub{font-size:13px;color:var(--sl3);margin-bottom:28px;margin-top:3px}
/* FORMS */
.fld{margin-bottom:16px}
.fld label{display:block;font-size:11px;font-weight:800;color:var(--sl);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:6px}
.fld input,.fld select,.fld textarea{width:100%;padding:11px 14px;border:1.5px solid var(--bd);
  border-radius:var(--r);font-size:14px;background:var(--wh);color:var(--tx);
  transition:border .15s,box-shadow .15s;outline:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--bl3);
  box-shadow:0 0 0 3px rgba(59,130,246,.14)}
.fld textarea{resize:vertical;min-height:78px}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--r);
  font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .15s;
  white-space:nowrap;line-height:1}
.btn:disabled{opacity:.4;pointer-events:none}
.bn{background:var(--nv3);color:#fff}.bn:hover{background:var(--bl);box-shadow:var(--shm);transform:translateY(-1px)}
.bb{background:var(--bl);color:#fff}.bb:hover{background:var(--bl2);transform:translateY(-1px)}
.bt{background:var(--tl);color:#fff}.bt:hover{filter:brightness(1.08)}
.bg{background:transparent;color:var(--sl);border:1.5px solid var(--bd)}.bg:hover{background:var(--bg)}
.bd{background:#e53e3e;color:#fff}.bd:hover{background:#c53030}
.bs{background:#38a169;color:#fff}.bs:hover{background:#2f855a}
.bw{background:#d97706;color:#fff}.bw:hover{background:#b45309}
.br{background:#e53e3e;color:#fff}.br:hover{background:#c53030}
.sm{padding:7px 14px;font-size:12px}.xs{padding:4px 10px;font-size:11px;border-radius:7px}
.bl{width:100%;display:flex;align-items:center;justify-content:center;padding:13px;font-size:15px;
  font-weight:800;border:none;border-radius:13px;
  background:linear-gradient(135deg,var(--nv3),var(--bl2));color:#fff;cursor:pointer;
  box-shadow:0 4px 20px rgba(30,95,168,.45);transition:all .2s}
.bl:hover{box-shadow:0 8px 30px rgba(30,95,168,.55);transform:translateY(-2px)}
/* SHELL */
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--nv);
  display:flex;flex-direction:column;height:100vh;overflow-y:auto;z-index:10}
.sbh{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.sblo{display:flex;align-items:center;gap:10px;color:#fff}
.sbli{width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--tl),var(--bl3));
  display:flex;align-items:center;justify-content:center;font-size:17px;
  box-shadow:0 4px 12px rgba(14,165,160,.3)}
.sbln{font-size:14px;font-weight:800;line-height:1.2;color:#fff}
.sbls{font-size:10px;opacity:.4;margin-top:1px;color:#fff}
.sbu{margin:14px 14px 0;padding:11px 13px;background:rgba(255,255,255,.07);border-radius:11px;
  display:flex;align-items:center;gap:10px}
.sbav{width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--bl3),var(--tl));
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff}
.sbun{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbur{font-size:10px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.sbnav{flex:1;padding:10px}
.sbsc{font-size:9px;font-weight:800;color:rgba(255,255,255,.28);text-transform:uppercase;
  letter-spacing:.12em;padding:14px 10px 5px}
.sbi{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;
  color:rgba(255,255,255,.55);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .15s;border:none;background:none;width:100%;text-align:left}
.sbi .ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sbi:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9)}
.sbi.on{background:rgba(255,255,255,.13);color:#fff;font-weight:700}
.sbi.on::before{content:'';width:3px;height:16px;background:var(--tl);
  border-radius:2px;margin-right:-2px;flex-shrink:0}
.sbft{padding:10px;border-top:1px solid rgba(255,255,255,.07)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:60px;flex-shrink:0;background:var(--wh);border-bottom:1px solid var(--bd);
  padding:0 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh)}
.tbti{font-size:17px;font-weight:800;color:var(--nv)}
.tbr{display:flex;align-items:center;gap:10px}
.tbdt{font-size:11px;font-weight:600;color:var(--sl2);background:var(--bg);padding:5px 11px;
  border-radius:7px;border:1px solid var(--bd);font-family:var(--mn)}
.tbst{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px}
.tbop{background:#f0fff4;color:#276749;border:1px solid #9ae6b4}
.tbcl{background:#fff5f5;color:#c53030;border:1px solid #fed7d7}
.cnt{flex:1;overflow-y:auto;padding:28px}
/* CARDS */
.card{background:var(--wh);border-radius:var(--rl);border:1px solid var(--bd);
  padding:22px;margin-bottom:20px;box-shadow:var(--sh)}
.chd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;
  flex-wrap:wrap;gap:10px}
.cti{font-size:15px;font-weight:800;color:var(--nv)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
/* STAT CARDS */
.sr{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:14px;margin-bottom:22px}
.scc{background:var(--wh);border-radius:var(--rl);padding:20px;border:1px solid var(--bd);
  box-shadow:var(--sh);position:relative;overflow:hidden}
.scc::after{content:attr(data-i);position:absolute;right:14px;top:12px;font-size:30px;opacity:.1;pointer-events:none}
.scc .sv{font-size:28px;font-weight:900;color:var(--nv);font-family:var(--mn);line-height:1}
.scc .sl{font-size:10px;font-weight:700;color:var(--sl3);text-transform:uppercase;letter-spacing:.06em;margin-top:5px}
.scc .bar{height:3px;background:linear-gradient(90deg,var(--nv3),var(--tl));border-radius:2px;margin-top:12px}
/* TABLES */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg);color:var(--sl);font-size:10.5px;font-weight:800;
  text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;text-align:left;
  border-bottom:1.5px solid var(--bd);white-space:nowrap}
tbody td{padding:10px 12px;border-bottom:1px solid #f0f4f8;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafcff}
/* SCORE PILLS */
.sc{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;
  font-weight:700;font-family:var(--mn);min-width:44px;text-align:center}
.scr{background:var(--rbg);color:var(--red)}
.sco{background:var(--obg);color:var(--ora)}
.scg{background:var(--gbg);color:var(--grn)}
.scb{background:var(--nsbg);color:var(--nsc)}
.scz{background:#f7fafc;color:#a0aec0;border:1px solid #e2e8f0}
/* BADGES */
.bdg{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.bbl{background:#ebf8ff;color:#2b6cb0} .bgr{background:#f0fff4;color:#276749}
.brd{background:#fff5f5;color:#c53030} .bor{background:#fffaf0;color:#c05621}
.bgy{background:#f7fafc;color:#4a5568} .bte{background:#e6fffa;color:#234e52}
.bwa{background:#fffff0;color:#744210} .bnv{background:var(--nv);color:#fff}
/* SEARCH */
.srch{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--bd);
  border-radius:var(--r);padding:8px 13px;margin-bottom:16px}
.srch input{border:none;background:none;outline:none;font-size:13px;flex:1;color:var(--tx)}
/* ALERTS */
.al{padding:12px 16px;border-radius:var(--r);font-size:13px;
  display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;line-height:1.55}
.alb{background:#ebf8ff;border:1px solid #bee3f8;color:#2c5282}
.aly{background:#fffff0;border:1px solid #f6e05e;color:#744210}
.alr{background:#fff5f5;border:1px solid #fed7d7;color:#822727}
.alg{background:#f0fff4;border:1px solid #9ae6b4;color:#1a4731}
/* NOTE INPUTS */
.ni{width:60px;padding:5px 6px;border:1.5px solid var(--bd);border-radius:7px;
  text-align:center;font-size:12px;font-family:var(--mn);font-weight:600;
  background:var(--bg2);transition:border .15s;outline:none;color:var(--tx)}
.ni:focus{border-color:var(--bl3);background:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
/* LOGS */
.lw{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto;padding-right:4px}
.le{padding:9px 13px;border-radius:9px;background:var(--bg2);
  border-left:3px solid var(--bl);font-size:12px;line-height:1.5}
.lts{font-family:var(--mn);font-size:10.5px;color:var(--sl3)}
.lwho{font-weight:700;color:var(--nv)} .ladm{color:var(--ora)}
/* UPLOAD */
.uzone{border:2px dashed var(--bd);border-radius:var(--rl);padding:34px;text-align:center;
  cursor:pointer;transition:all .2s;background:var(--bg2)}
.uzone:hover{border-color:var(--bl3);background:#ebf8ff}
.uzic{font-size:38px;margin-bottom:10px}
.uzone p{font-size:13px;color:var(--sl2)} .uzone small{font-size:11px;color:var(--sl3)}
/* REHAB */
.rbc{border:2px solid #f6e05e;background:#fffff0;border-radius:var(--rl);
  padding:18px 20px;margin-bottom:14px}
.rbc h4{color:#744210;font-size:14px;font-weight:800;margin-bottom:6px}
/* PAGE HEADER */
.ph{margin-bottom:22px}
.ph h2{font-size:22px;font-weight:900;color:var(--nv);letter-spacing:-.3px}
.ph p{font-size:13px;color:var(--sl2);margin-top:3px}
.mty{text-align:center;padding:40px 20px;color:var(--sl3)}
.mty .ei{font-size:36px;margin-bottom:10px}
/* VIRTUAL CLASS */
.vc-card{background:linear-gradient(135deg,var(--nv2),var(--nv3));color:#fff;
  border-radius:var(--rl);padding:18px 20px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.vc-card h4{font-size:14px;font-weight:800;margin-bottom:4px}
.vc-card small{font-size:11px;opacity:.65}
/* BOLETIN PDF */
#pdfBox{font-family:'Outfit',sans-serif;max-width:750px;background:#fff;color:#0b1e33}
.bh{background:linear-gradient(135deg,#0b1e33 0%,#1a3a5c 100%);color:#fff;
  padding:28px 32px;position:relative;overflow:hidden}
.bh::after{content:'🏛️';font-size:90px;position:absolute;right:20px;top:50%;
  transform:translateY(-50%);opacity:.07;line-height:1}
.bh h1{font-size:19px;font-weight:900;margin-bottom:3px}
.bh p{font-size:11px;opacity:.6}
.binf{background:#eef2f7;padding:16px 32px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.binf .bi{font-size:12px;line-height:1.6}
.binf .bi strong{font-weight:700}
.bbd{padding:18px 32px}
.bpr{margin-bottom:18px}
.bpr h3{font-size:13px;font-weight:800;color:#1a3a5c;margin-bottom:8px;
  border-bottom:2px solid #1a3a5c;padding-bottom:5px;
  display:flex;justify-content:space-between}
.btbl{width:100%;border-collapse:collapse;font-size:11.5px}
.btbl th{background:#1a3a5c;color:#fff;padding:6px 9px;text-align:left;font-weight:700;font-size:11px}
.btbl td{padding:6px 9px;border-bottom:1px solid #dde4ee}
.btbl tr:last-child td{border-bottom:none}
.bsig{display:flex;justify-content:space-around;margin-top:50px;padding:0 32px 32px}
.bsig .bs{text-align:center}
.bsig .bs .ln{width:165px;border-top:1px solid #1a3a5c;margin:0 auto 6px}
.bsig .bs small{font-size:10px;color:#718096}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="ls">
  <div class="lgw">
    <div class="lgh">
      <div class="lgm">🏛️</div>
      <h1>EduSistema<br><em>Pro</em></h1>
      <p>Plataforma académica integral — notas tripartitas, clases virtuales, excusas dirigidas, reportes y más.</p>
      <div class="lgr">
        <span class="lgc p">PROFESOR</span>
        <span class="lgc e">ESTUDIANTE</span>
      </div>
    </div>
    <div class="lgc2">
      <h2>Bienvenido</h2>
      <p class="sub">Ingresa tus credenciales institucionales</p>
      <div class="fld"><label>Usuario</label>
        <input type="text" id="liu" placeholder="nombre.usuario" autocomplete="username"></div>
      <div class="fld"><label>Contraseña</label>
        <input type="password" id="lip" placeholder="••••••••" autocomplete="current-password"></div>
      <div id="lierr" style="font-size:13px;color:var(--red);margin-bottom:12px;display:none;
        padding:8px 12px;background:var(--rbg);border-radius:8px;border:1px solid #fed7d7"></div>
      <button class="bl" onclick="doLogin()">Ingresar →</button>
    </div>
  </div>
</div>
<!-- APP -->
<div id="app" class="hidden">
  <nav class="sidebar" id="sidebar">
    <div class="sbh">
      <div class="sblo">
        <div class="sbli">🏛️</div>
        <div><div class="sbln">EduSistema Pro</div><div class="sbls">Plataforma Académica</div></div>
      </div>
      <div class="sbu" id="sbUser"></div>
    </div>
    <div class="sbnav" id="sbNav"></div>
    <div class="sbft">
      <button class="sbi" onclick="doLogout()" style="width:100%">
        <span class="ic">🚪</span>Cerrar Sesión</button>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <span class="tbti" id="tbTitle">Panel</span>
      <div class="tbr">
        <span class="tbdt" id="tbDate"></span>
        <span id="tbStatus"></span>
      </div>
    </div>
    <div class="cnt" id="contentArea"></div>
  </div>
</div>
<div id="pdfBox" class="hidden"></div>

<script>
'use strict';
/* ============================================================
   BASE DE DATOS — GUÍA DE INTEGRACIÓN EXTERNA
   ============================================================
   ACTUALMENTE: La BD se guarda en localStorage del navegador.
   La clave de almacenamiento es: 'edusistema_v5'

   PARA CONECTAR UNA BD EXTERNA (Firebase, Supabase, REST API):
   ============================================================
   HAY DOS FUNCIONES QUE DEBES REEMPLAZAR:

   1. dbLoad() — SE LLAMA AL INICIAR LA APP
      Reemplaza el contenido con una llamada a tu API:
      Ejemplo Firebase Firestore:
        const snap = await db.collection('edusistema').doc('datos').get();
        DB = snap.data();

   2. dbSave() — SE LLAMA CADA VEZ QUE HAY UN CAMBIO
      Reemplaza con escritura a tu API:
      Ejemplo Firebase Firestore:
        await db.collection('edusistema').doc('datos').set(DB);
      Ejemplo REST:
        await fetch('/api/db', {method:'PUT', body:JSON.stringify(DB)});

   ESTRUCTURA DEL OBJETO DB:
   ┌─────────────────────────────────────────────────────────┐
   │ DB.admin         → {id, nombre, ti, usuario, password, role}
   │ DB.profs[]       → [{id, nombre, ti, usuario, password, role,
   │                       salones[], materias[], ciclo}]
   │ DB.ests[]        → [{id, nombre, ti, usuario, password, role,
   │                       salon, ciclo, blocked}]
   │ DB.mP[]          → materias de primaria ['Matemáticas', ...]
   │ DB.mB[]          → materias de bachillerato
   │ DB.pers[]        → periodos ['Periodo 1', 'Periodo 2', ...]
   │ DB.sals[]        → salones [{nombre, ciclo, mats:{profId,mats[]}}]
   │ DB.notas{}       → {estId: {periodo: {materia: {a,c,r}}}}
   │                     a=aptitud(60%) c=actitud(20%) r=resp(20%)
   │ DB.dr            → {s:'YYYY-MM-DD', e:'YYYY-MM-DD'} rango global notas
   │ DB.drPer{}       → {periodo: {s, e, extPer}} rango por periodo
   │ DB.ext           → {on:bool, s:'YYYY-MM-DD', e:'YYYY-MM-DD'}
   │ DB.ups{}         → {estId: [{id, nombre, materia, periodo, profId,
   │                       profNombre, desc, fecha, size, type,
   │                       dataUrl, revisado, revisadoTs}]}
   │ DB.asist{}       → {fecha: {salon: {estId: bool}}}
   │ DB.exc[]         → [{id, estId, estNombre, salon, profId,
   │                       causa, texto, fecha, hora, leida}]
   │ DB.vclases[]     → [{id, salon, profId, titulo, url, fecha}]
   │ DB.recs[]        → recuperaciones ACTIVAS del periodo actual
   │ DB.planes[]      → planes de recuperación ACTIVOS
   │ DB.histRecs[]    → recuperaciones ARCHIVADAS de periodos anteriores
   │ DB.histPlanes[]  → planes ARCHIVADOS de periodos anteriores
   │ DB.audit[]       → [{ts, uid, user, role, accion, extra}]
   │ DB.blk{}         → {usuario: {on:bool, ts}}
   │ DB.estHist[]     → historial de estudiantes registrados
   └─────────────────────────────────────────────────────────┘

   NOTA: dataUrl contiene archivos en base64. Para BD externa
   se recomienda subir los archivos a un storage separado
   (Firebase Storage, S3, Cloudinary) y guardar solo la URL.
   ============================================================ */

let DB={},CU=null;
const FA={};

function dbLoad(){
  const raw=localStorage.getItem(DBK);
  if(raw){
    DB=JSON.parse(raw);
    DB.mP   =DB.mP   ||dfP(); DB.mB   =DB.mB   ||dfB();
    DB.pers =DB.pers ||dfPer();DB.sals =DB.sals ||[];
    DB.audit=DB.audit||[];    DB.blk  =DB.blk  ||{};
    DB.dr   =DB.dr   ||{s:'',e:''};
    DB.drPer=DB.drPer||{};  /* Per-period note ranges: {periodoName:{s,e,extPer}} */
    DB.ext  =DB.ext  ||{on:false,s:'',e:''};
    DB.ups  =DB.ups  ||{};    DB.asist=DB.asist||{};
    DB.exc  =DB.exc  ||[];    DB.profs=DB.profs||[];
    DB.vclases=DB.vclases||[];
    DB.recs=DB.recs||[];  /* Recovery submissions */
    DB.planes=DB.planes||[]; /* Recovery plans from professors */
    DB.histRecs=DB.histRecs||[]; /* Archived recovery submissions per closed period */
    DB.histPlanes=DB.histPlanes||[]; /* Archived plans per closed period */
    DB.estHist=DB.estHist||DB.ests.map(e=>({id:e.id,nombre:e.nombre,ti:e.ti||'',salon:e.salon||'',registrado:e.registrado||'—',activo:true}));
    dbSave();
  } else dbInit();
  /* Migrate plaintext passwords to SHA-256 hash on first load */

}
function dbSave(){localStorage.setItem(DBK,JSON.stringify(DB));}
function dfP(){return['Matemáticas','Lengua Castellana','Ciencias Naturales','Ciencias Sociales','Ed. Artística','Ed. Física','Ética'];}
function dfB(){return['Matemáticas','Español','Ciencias Naturales','Ciencias Sociales','Inglés','Ed. Física','Arte'];}
function dfPer(){return['Periodo 1','Periodo 2','Periodo 3','Periodo 4'];}

function dbInit(){
  const ests=[];
  for(let i=1;i<=10;i++)
    ests.push({id:'est'+i,nombre:'Estudiante '+i,ti:'TI-'+String(100000+i),
      usuario:'est'+i,password:'est'+i+'123',role:'est',salon:'',blocked:false});
  const notas={};
  ests.forEach(e=>{notas[e.id]=mkN(dfPer(),[...dfP(),...dfB()]);});
  DB={
    admin:{id:'admin',nombre:'Administrador',ti:'CC-000001',
      usuario:'admin',password:'admin123',role:'admin'},
    profs:[],ests,mP:dfP(),mB:dfB(),pers:dfPer(),sals:[],notas,
    audit:[],blk:{},dr:{s:'',e:''},drPer:{},ext:{on:false,s:'',e:''},
    ups:{},asist:{},exc:[],vclases:[],recs:[],planes:[],histRecs:[],histPlanes:[],
    estHist:ests.map(e=>({id:e.id,nombre:e.nombre,ti:e.ti||'',salon:'',registrado:new Date().toLocaleDateString('es-CO'),activo:true}))
  };
  dbSave();
}

/* Scaffold: {per:{mat:{a,c,r}}} — a=aptitud60%, c=actitud20%, r=resp20% */
function mkN(pers,mats){
  const n={};
  pers.forEach(p=>{n[p]={};mats.forEach(m=>{n[p][m]={a:0,c:0,r:0};});});
  return n;
}

function syncN(eid){
  if(!DB.notas[eid]) DB.notas[eid]={};
  const mats=getMats(eid);
  DB.pers.forEach(p=>{
    if(!DB.notas[eid][p]) DB.notas[eid][p]={};
    mats.forEach(m=>{
      if(!DB.notas[eid][p][m]||typeof DB.notas[eid][p][m]!=='object')
        DB.notas[eid][p][m]={a:0,c:0,r:0};
    });
  });
}

function cicloOf(sname){return DB.sals.find(s=>s.nombre===sname)?.ciclo||'bachillerato';}

/* getMats: returns subjects for a student.
   For bachillerato: if any professor has salonMaterias[salon], use union of those materias.
   Otherwise fall back to global mB list. Primaria always uses mP. */
function getMats(eid){
  const e=DB.ests.find(x=>x.id===eid);
  if(!e) return[...DB.mB];
  if(cicloOf(e.salon)==='primaria') return[...DB.mP];
  /* Bach: collect materias assigned to this specific salon */
  const salonMats=getSalonMats(e.salon);
  return salonMats.length?salonMats:[...DB.mB];
}

/* Get list of subjects assigned to a specific salon (union across all professors) */
function getSalonMats(salon){
  const set=new Set();
  DB.profs.forEach(p=>{
    if(p.ciclo!=='bachillerato') return;
    const sm=p.salonMaterias||{};
    if(sm[salon]) sm[salon].forEach(m=>set.add(m));
    else if((p.salones||[]).includes(salon)&&(p.materias||[]).length)
      (p.materias||[]).forEach(m=>set.add(m)); /* legacy compat */
  });
  return[...set];
}

/* Get materias a specific professor teaches in a specific salon */
function getProfMatsSalon(profId,salon){
  const p=DB.profs.find(x=>x.id===profId);if(!p)return[];
  if(p.ciclo==='primaria') return getMats(DB.ests.find(e=>e.salon===salon)?.id||'');
  const sm=p.salonMaterias||{};
  if(sm[salon]&&sm[salon].length) return sm[salon];
  return p.materias||[];
}

/* Definitiva = 60%a + 20%c + 20%r */
function def(t){return+((t.a||0)*.6+(t.c||0)*.2+(t.r||0)*.2).toFixed(2);}

function pprom(eid,per){
  syncN(eid);
  const mats=getMats(eid);
  if(!DB.notas[eid][per]) return 0;
  const ds=mats.map(m=>def(DB.notas[eid][per][m]||{a:0,c:0,r:0}));
  return+(ds.reduce((s,v)=>s+v,0)/ds.length).toFixed(2);
}
function gprom(eid){
  const act=DB.pers.filter(p=>pprom(eid,p)>0);
  if(!act.length) return 0;
  return+(act.reduce((s,p)=>s+pprom(eid,p),0)/act.length).toFixed(2);
}
function matPerd(eid){
  return getMats(eid).filter(m=>{
    const act=DB.pers.filter(p=>{const t=DB.notas[eid]?.[p]?.[m];return t&&(t.a>0||t.c>0||t.r>0);});
    if(!act.length) return false;
    return act.reduce((s,p)=>s+def(DB.notas[eid][p][m]),0)/act.length<3;
  });
}
function puestoS(eid){
  const e=DB.ests.find(x=>x.id===eid);if(!e?.salon) return'-';
  const c=ebySalon(e.salon).map(x=>({id:x.id,p:gprom(x.id)})).sort((a,b)=>b.p-a.p);
  const i=c.findIndex(x=>x.id===eid);return i>=0?i+1:'-';
}
function puestoP(eid,per){
  const e=DB.ests.find(x=>x.id===eid);if(!e?.salon) return'-';
  const c=ebySalon(e.salon).map(x=>({id:x.id,p:pprom(x.id,per)})).sort((a,b)=>b.p-a.p);
  const i=c.findIndex(x=>x.id===eid);return i>=0?i+1:'-';
}

function scC(n){n=+n;if(n===0)return'sc scz';if(n<3)return'sc scr';if(n<4)return'sc sco';if(n<=4.5)return'sc scg';return'sc scb';}
function scCol(n){n=+n;if(n===0)return'#a0aec0';if(n<3)return'var(--red)';if(n<4)return'var(--ora)';if(n<=4.5)return'var(--grn)';return'var(--nsc)';}
function today(){return new Date().toISOString().split('T')[0];}
function notasOk(per){
  if(CU?.role==='admin') return true;
  /* Extraordinary period open → notes always open for professors */
  if(CU?.role==='profe'&&DB.ext?.on) return true;
  const t=today();
  /* Per-period range check */
  if(per&&DB.drPer?.[per]){
    const{s,e}=DB.drPer[per];
    if(s&&e) return t>=s&&t<=e;
  }
  /* Global range fallback */
  const{s,e}=DB.dr;if(!s||!e) return true;
  return t>=s&&t<=e;
}
/* Excusas window: open 18:00–07:00 */
function excusasOk(){
  const h=new Date().getHours();
  return h>=18||h<7;
}
function ebySalon(salon){
  return DB.ests.filter(e=>e.salon===salon).sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'));
}
function estsByCiclo(ciclo){
  const sn=DB.sals.filter(s=>s.ciclo===ciclo).map(s=>s.nombre);
  let list=ciclo==='primaria'
    ?DB.ests.filter(e=>!e.salon||sn.includes(e.salon))
    :DB.ests.filter(e=>sn.includes(e.salon));
  return list.sort((a,b)=>{
    if(a.salon!==b.salon) return(a.salon||'').localeCompare(b.salon||'','es');
    return a.nombre.localeCompare(b.nombre,'es');
  });
}
function profForMat(mat,salon){
  /* Bach: first check salonMaterias[salon], then global materias */
  const bp=DB.profs.find(p=>{
    if(p.ciclo!=='bachillerato') return false;
    if(!(p.salones||[]).includes(salon)) return false;
    const sm=(p.salonMaterias||{})[salon];
    if(sm&&sm.length) return sm.includes(mat);
    return(p.materias||[]).includes(mat);
  });
  if(bp) return bp;
  /* Primaria: any prof in that salon */
  return DB.profs.find(p=>p.ciclo==='primaria'&&(p.salones||[]).includes(salon))||null;
}
function profsInSalon(salon){
  return DB.profs.filter(p=>(p.salones||[]).includes(salon));
}
function uExists(u){
  return DB.admin.usuario===u||!!DB.profs.find(p=>p.usuario===u)||!!DB.ests.find(e=>e.usuario===u);
}

   SEGURIDAD — HASHING, SANITIZACIÓN, SESIÓN
============================================================ */
/* SHA-256 hash asíncrono (Web Crypto API, nativo en todos los browsers modernos) */
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
/* Sanitiza cualquier string antes de insertarlo en innerHTML — previene XSS */
function esc(str){
  if(str==null) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/`/g,'&#96;');
}
/* Hash de contraseña con sal estática de instancia — migración transparente */
const SALT='EduSistema_v5_2026';
async function hashPwd(raw){
  if(!raw) return '';
  /* Ya hasheado (64 hex chars) → retornar sin cambio */
  if(/^[0-9a-f]{64}$/.test(raw)) return raw;
  return sha256(SALT+raw);
}
async function verifyPwd(raw,stored){
  const h=await hashPwd(raw);
  /* Acepta tanto hash como plaintext durante migración */
  return h===stored||raw===stored;
}
/* Migrar todas las contraseñas en texto plano a hash al cargar */
async function migratePasswords(){
  let changed=false;
  const migrate=async arr=>{
    for(const u of arr){
      if(u.password&&!/^[0-9a-f]{64}$/.test(u.password)){
        u.password=await hashPwd(u.password);changed=true;
      }
    }
  };
  if(DB.admin&&!/^[0-9a-f]{64}$/.test(DB.admin.password||'')){
    DB.admin.password=await hashPwd(DB.admin.password);changed=true;
  }
  await migrate(DB.profs||[]);
  await migrate(DB.ests||[]);
  if(changed) dbSave();
}

/* ---- Sesión con inactividad ---- */
let _sessionTimer=null;
const SESSION_TIMEOUT=20*60*1000; /* 20 minutos */
function resetSessionTimer(){
  clearTimeout(_sessionTimer);
  if(!CU) return;
  _sessionTimer=setTimeout(()=>{
    if(CU){
      logAudit('Sesión cerrada por inactividad');
      doLogout();
      Swal.fire({icon:'info',title:'Sesión expirada',
        text:'Tu sesión fue cerrada por inactividad (20 minutos).',confirmButtonText:'Aceptar'});

['click','keydown','mousemove','touchstart'].forEach(ev=>

/* ---- Guardas de rol ---- */
const ROLE_MAP={
  admin:new Set(['dash','asal','apri','abac','aprf','amat','anot','areh','afec','ablk','aaud','aexp','aexc','avcl','ahist']),
  profe:new Set(['ph','pnot','past','pvir','ptar','prec','phist']),
  est:new Set(['eb','east','etare','eexc','eprof','evir','ereh','ehist'])
};
function canAccess(pid){
  if(!CU) return false;
  const role=CU.role==='admin'?'admin':CU.role==='profe'?'profe':'est';
  return ROLE_MAP[role]?.has(pid)??false;
}
/* Valida CU contra DB (protege contra manipulación de CU en consola) */
function validateSession(){
  if(!CU) return false;
  const dbUser=CU.role==='admin'
    ?(DB.admin.id===CU.id?DB.admin:null)
    :CU.role==='profe'
      ?DB.profs.find(p=>p.id===CU.id)
      :DB.ests.find(e=>e.id===CU.id);
  if(!dbUser||dbUser.blocked){doLogout();return false;}
  /* Re-sync role from DB to prevent privilege escalation */
  CU.role=dbUser.role;
  return true;
}

async function doLogin(){
  const u=gi('liu').value.trim(),p=gi('lip').value.trim(),err=gi('lierr');
  function show(m){err.textContent=m;err.style.display='block';}
  if(!u||!p){show('Ingresa usuario y contraseña.');return;}
  const isAdm=DB.admin.usuario===u;
  /* Lockout check */
  const blk=DB.blk[u];
  if(!isAdm&&blk?.on){
    /* Lockout temporal: desbloquear automáticamente después de 30 min */
    if(blk.ts&&(Date.now()-new Date(blk.ts).getTime())>30*60*1000){
      DB.blk[u]={on:false};dbSave();
    } else {
      show('Cuenta bloqueada. Contacta al administrador o espera 30 minutos.');return;
    }
  }
  const user=await findUser(u,p);
  if(!user){
    if(!isAdm){
      FA[u]=(FA[u]||0)+1;
      if(FA[u]>=5){
        DB.blk[u]={on:true,ts:new Date().toISOString()};dbSave();
        logAuditAnon(u,'Cuenta bloqueada tras 5 intentos fallidos');
        show('Cuenta bloqueada tras 5 intentos. Espera 30 minutos.');
      } else {
        show(`Credenciales incorrectas. Intento ${FA[u]} de 5.`);
      }
    } else {
      show('Credenciales incorrectas.');
    }
    return;
  }
  FA[u]=0;CU=user;
  gi('ls').classList.add('hidden');gi('app').classList.remove('hidden');
  resetSessionTimer();
  bootApp();
}
async function findUser(u,p){
  /* Check admin */
  if(DB.admin.usuario===u&&await verifyPwd(p,DB.admin.password)) return DB.admin;
  /* Check profs */
  for(const x of DB.profs||[]){
    if(x.usuario===u&&await verifyPwd(p,x.password)) return x;
  }
  /* Check students */
  for(const x of DB.ests||[]){
    if(x.usuario===u&&await verifyPwd(p,x.password)) return x;
  }
  return null;
}
function doLogout(){
  clearTimeout(_sessionTimer);
  CU=null;
  gi('app').classList.add('hidden');gi('ls').classList.remove('hidden');
  gi('liu').value='';gi('lip').value='';gi('lierr').style.display='none';
}
function logAuditAnon(usuario,msg){
  if(!DB.audit) DB.audit=[];
  DB.audit.unshift({ts:new Date().toISOString(),uid:'?',user:usuario,role:'?',accion:msg,extra:''});
  dbSave();
}

/* Notify student if extraordinary period opened or closed since last login */
function notifyExtPeriod(){
  const mp=matPerd(CU.id);
  const esElegible=mp.length>=1&&mp.length<=2;
  const KEY='extSeen_'+CU.id;
  const prev=JSON.parse(localStorage.getItem(KEY)||'null');
  const curr={on:DB.ext.on,s:DB.ext.s,e:DB.ext.e};
  const now=new Date().toLocaleDateString('es-CO');

  /* Detect changes */
  const abrioAhora =!prev?.on && curr.on;
  const cerroAhora  = prev?.on && !curr.on;
  const fechasCambiaron = prev?.on && curr.on && (prev.s!==curr.s || prev.e!==curr.e);

  /* Save current state */
  localStorage.setItem(KEY, JSON.stringify(curr));

  if(!esElegible) return; /* Only notify students with ≤2 failed subjects */

  if(abrioAhora){
    Swal.fire({
      icon:'warning',
      title:'🔄 ¡Periodo de Recuperación Abierto!',
      html:`<div style="font-family:var(--fn);text-align:left">
        <p>Tienes <strong style="color:#c53030">${mp.length}</strong> materia(s) en recuperación:</p>
        <div style="margin:10px 0">${mp.map(m=>`<span class="bdg brd" style="margin:3px">${m}</span>`).join('')}</div>
        <p>📅 Periodo extraordinario:<br>
          <strong>${curr.s}</strong> → <strong>${curr.e}</strong>
        </p>
        <p style="font-size:13px;color:#718096">Ve a <em>Mi Recuperación</em> para enviar tus trabajos al docente.</p>
      </div>`,
      confirmButtonText:'Ir a Mi Recuperación',
      showCancelButton:true,cancelButtonText:'Más tarde',
      confirmButtonColor:'var(--nv)'
    }).then(r=>{if(r.isConfirmed) goto('ereh');});
  } else if(cerroAhora){
    Swal.fire({
      icon:'info',
      title:'🔒 Periodo de Recuperación Cerrado',
      html:`<div style="font-family:var(--fn)">
        <p>El periodo extraordinario de recuperación <strong>ha finalizado</strong>.</p>
        <p style="font-size:13px;color:#718096">Si tienes dudas sobre tu estado, consulta con tu docente o el administrador.</p>
      </div>`,
      confirmButtonText:'Entendido',confirmButtonColor:'var(--nv)'
    });
  } else if(fechasCambiaron){
    Swal.fire({
      icon:'info',
      title:'📅 Fechas de Recuperación Actualizadas',
      html:`<div style="font-family:var(--fn);text-align:left">
        <p>Las fechas del periodo de recuperación cambiaron:</p>
        <p>📅 Nuevo rango: <strong>${curr.s}</strong> → <strong>${curr.e}</strong></p>
        <p style="font-size:13px;color:#718096">Consulta <em>Mi Recuperación</em> para más detalles.</p>
      </div>`,
      confirmButtonText:'Ver Recuperación',
      showCancelButton:true,cancelButtonText:'OK',
      confirmButtonColor:'var(--nv)'
    }).then(r=>{if(r.isConfirmed) goto('ereh');});
  } else if(curr.on){
    /* Period already open — check for unread plans */
    const planesNuevos=(DB.planes||[]).filter(p=>p.estId===CU.id&&!p.visto);
    /* Deduplicate notification by materia for display only */
    const matsMostrar=[...new Set(planesNuevos.map(p=>p.materia))];
    const nb=gi('ni_ereh');
    if(planesNuevos.length){
      /* Show alert for new plan */
      Swal.fire({
        icon:'success',
        title:'📋 ¡Tu docente envió un Plan de Recuperación!',
        html:`<div style="font-family:var(--fn);text-align:left">
          <p>Tienes <strong>${planesNuevos.length}</strong> plan(es) nuevo(s) de recuperación:</p>

async function addEst(ciclo){
  const n=gi('nen').value.trim(),ti=gi('neti').value.trim(),
        s=gi('nes').value,u=gi('neu').value.trim(),p=gi('nep').value.trim();
  if(!n||!u||!p){sw('error','Nombre, usuario y contraseña son obligatorios');return;}
  if(uExists(u)){sw('error','Ese usuario ya existe');return;}
  const id='est_'+Date.now();
  const fecha=new Date().toLocaleDateString('es-CO');
  const hashed=await hashPwd(p);
  DB.ests.push({id,nombre:n,ti,usuario:u,password:hashed,role:'est',salon:s,blocked:false,registrado:fecha});
  DB.notas[id]={};
  DB.pers.forEach(per=>{DB.notas[id][per]={};getMats(id).forEach(m=>{DB.notas[id][per][m]={a:0,c:0,r:0};});});
  if(!DB.estHist) DB.estHist=[];
  DB.estHist.push({id,nombre:n,ti,salon:s,registrado:fecha,activo:true});
  dbSave();['nen','neti','neu','nep'].forEach(x=>gi(x).value='');gi('nes').value='';
  renderEstTabla(ciclo);sw('success','Estudiante agregado','',1400);
}
function delEst(eid,ciclo){
  const e=DB.ests.find(x=>x.id===eid);
  Swal.fire({title:'¿Eliminar?',text:e.nombre,icon:'warning',showCancelButton:true,
    confirmButtonColor:'#e53e3e'}).then(r=>{
    if(!r.isConfirmed) return;
    if(DB.estHist){const h=DB.estHist.find(x=>x.id===eid);if(h){h.activo=false;h.eliminado=new Date().toLocaleDateString('es-CO');}}
    DB.ests=DB.ests.filter(x=>x.id!==eid);delete DB.notas[eid];
    dbSave();renderEstTabla(ciclo);
  });
}
function editEst(eid,ciclo){
  const e=DB.ests.find(x=>x.id===eid);
  const sOpts=DB.sals.map(s=>`<option value="${s.nombre}" ${s.nombre===e.salon?'selected':''}>${s.nombre}</option>`).join('');
  Swal.fire({title:'Editar Estudiante',width:500,
    html:sF([{id:'een',lb:'Nombre',val:e.nombre},{id:'eeti',lb:'T.I.',val:e.ti||''},

/* Dialog to assign which materias a prof teaches in each salon */
function openSalonMaterias(pid,cb){
  const p=DB.profs.find(x=>x.id===pid);if(!p)return;
  const salones=p.salones||[];
  if(!salones.length){if(cb)cb();return;}
  const rows=salones.map(s=>{
    const cur=(p.salonMaterias||{})[s]||[];
    return`<div style="margin-bottom:12px;padding:10px 12px;background:var(--bg2);border-radius:8px;border:1px solid var(--bd)">
      <div style="font-size:12px;font-weight:800;color:var(--nv);margin-bottom:7px">📍 ${s}</div>

          ${m}</label>`).join('')}
      </div>

  }).join('');
  Swal.fire({title:`Materias por Salón — ${p.nombre}`,width:620,
    html:`<div style="text-align:left;font-family:var(--fn)">
      <div class="al alb" style="margin-bottom:12px;font-size:12px">

    </div>`,
    showCancelButton:true,confirmButtonText:'Guardar Asignaciones',
    preConfirm:()=>{
      const sm={};

        const key=s.replace(/\s/g,'_');
        sm[s]=qq(`.sm_${key}:checked`).map(c=>c.value);

    if(!r.isConfirmed){if(cb)cb();return;}
    Object.assign(p,r.value);dbSave();
    if(cb)cb();sw('success','Asignaciones guardadas','',1400);
  });
}

function renderMats(){
  const mp=gi('mlP');if(mp) mp.innerHTML=DB.mP.map(m=>matItem(m,'delMP','primaria')).join('');
  const mb=gi('mlB');if(mb) mb.innerHTML=DB.mB.map(m=>matItem(m,'delMB','bachillerato')).join('');

function addMP(){const v=gi('nmp').value.trim();if(!v||DB.mP.includes(v))return;DB.mP.push(v);patchMats('primaria',v);dbSave();gi('nmp').value='';renderMats();}
function addMB(){const v=gi('nmb').value.trim();if(!v||DB.mB.includes(v))return;DB.mB.push(v);patchMats('bachillerato',v);dbSave();gi('nmb').value='';renderMats();}
function delMP(m){if(DB.mP.length<=1){sw('error','Mínimo 1 materia');return;}DB.mP=DB.mP.filter(x=>x!==m);dbSave();renderMats();}
function delMB(m){if(DB.mB.length<=1){sw('error','Mínimo 1 materia');return;}DB.mB=DB.mB.filter(x=>x!==m);dbSave();renderMats();}
function patchMats(ciclo,m){
  DB.ests.forEach(e=>{
    if(cicloOf(e.salon)!==ciclo) return;
    DB.pers.forEach(p=>{if(DB.notas[e.id]?.[p]) DB.notas[e.id][p][m]={a:0,c:0,r:0};});
  });
}
function renameMat(ciclo,old){
  Swal.fire({title:'Renombrar Materia',input:'text',inputValue:old,showCancelButton:true,confirmButtonText:'Guardar'}).then(r=>{
    if(!r.isConfirmed||!r.value.trim()) return;
    const nw=r.value.trim();
    const arr=ciclo==='primaria'?DB.mP:DB.mB;
    const i=arr.indexOf(old);if(i<0)return;arr[i]=nw;
    DB.ests.forEach(e=>{DB.pers.forEach(p=>{
      if(DB.notas[e.id]?.[p]?.[old]){DB.notas[e.id][p][nw]=DB.notas[e.id][p][old];delete DB.notas[e.id][p][old];}
    });});
    dbSave();renderMats();sw('success','Renombrada','',1400);
  });
}
function addPer(){
  const v=gi('nper').value.trim();if(!v||DB.pers.includes(v))return;
  DB.pers.push(v);
  DB.ests.forEach(e=>{
    if(!DB.notas[e.id]) DB.notas[e.id]={};
    DB.notas[e.id][v]={};
    getMats(e.id).forEach(m=>{DB.notas[e.id][v][m]={a:0,c:0,r:0};});
  });
  dbSave();gi('nper').value='';renderMats();
}
function delPer(p){
  if(DB.pers.length<=1){sw('error','Mínimo 1 periodo');return;}
  DB.pers=DB.pers.filter(x=>x!==p);dbSave();renderMats();
}

function renderANotTbl(salon,per,list){

      </select></td>
      <td id="apr_${e.id}"><span class="${scC(pp)}">${pp.toFixed(2)}</span></td>`;

  });
}
function saveTri(inp){
  if(!validateSession()||!['admin','profe'].includes(CU.role)){sw('error','Sin autorización');return;}
  const eid=inp.dataset.eid,per=decodeURIComponent(inp.dataset.per),
        mat=decodeURIComponent(inp.dataset.mat),f=inp.dataset.f;
  const v=parseFloat(inp.value);
  if(isNaN(v)||v<0||v>5){inp.value=(DB.notas[eid]?.[per]?.[mat]?.[f]||0).toFixed(1);return;}
  /* Verify this prof teaches this student (prevent cross-salon writes) */
  if(CU.role==='profe'){
    const est=DB.ests.find(e=>e.id===eid);
    if(!est||(CU.salones||[]).indexOf(est.salon)<0){sw('error','Sin autorización para este estudiante');return;}
  }
  syncN(eid);
  const oldDef=def(DB.notas[eid][per][mat]);
  DB.notas[eid][per][mat][f]=v;dbSave();
  const nd=def(DB.notas[eid][per][mat]);
  auditLog(DB.ests.find(e=>e.id===eid)?.nombre||eid,`${mat}(${f})`,oldDef.toFixed(2),nd.toFixed(2));
  const dc=gi(`dc_${eid}_${encodeURIComponent(mat)}_${encodeURIComponent(per)}`);
  if(dc) dc.innerHTML=`<span class="${scC(nd)}" style="font-size:11px">${nd.toFixed(2)}</span>`;
  const apr=gi('apr_'+eid);
  if(apr){const p=pprom(eid,per);apr.innerHTML=`<span class="${scC(p)}">${p.toFixed(2)}</span>`;}
}
function saveDisc(eid,v){
  if(!validateSession()||!['admin','profe'].includes(CU.role)) return;
  syncN(eid);DB.notas[eid].disciplina=v;dbSave();
}

function saveDRPer(key,per){
  if(!DB.drPer) DB.drPer={};
  const s=gi('dps_'+key)?.value||'';
  const e=gi('dpe_'+key)?.value||'';
  const extPer=gi('dpex_'+key)?.value||'';
  DB.drPer[per]={s,e,extPer};
  dbSave();
  /* Auto-activate ext if this period just closed and ext has dates */
  const hoy=today();
  if(e&&hoy>e&&DB.ext.s&&DB.ext.e&&!DB.ext.on){
    DB.ext.on=true;dbSave();
    sw('success',`Periodo "${per}" cerrado`,`Periodo Extraordinario activado automáticamente.`,2500);
  } else {
    sw('success',`Periodo "${per}" guardado`,'',1400);
  }
}
function saveDR(){
  const prev=DB.dr;
  DB.dr={s:gi('drs').value,e:gi('dre').value};
  dbSave();
  /* If notes range just got a closing date AND ext period has dates → auto-activate recovery */
  const hoy=today();
  if(DB.dr.e && hoy>DB.dr.e && DB.ext.s && DB.ext.e && !DB.ext.on){
    DB.ext.on=true;dbSave();
    sw('success','Guardado','Rango de notas cerrado — Periodo Extraordinario activado automáticamente.',2500);
  } else {
    sw('success','Guardado','',1400);
  }
  bootApp();
}
function saveExt(){
  const wasOn=DB.ext.on;
  DB.ext={on:gi('exon').checked,s:gi('exs').value,e:gi('exe').value};
  dbSave();
  if(wasOn&&!DB.ext.on){
    archivarYLimpiarRecuperacion();
  } else if(!wasOn&&DB.ext.on){
    sw('success','Periodo Extraordinario activado','Los estudiantes elegibles ya pueden acceder a Mi Recuperación.',2000);
  } else {
    sw('success','Guardado','',1400);
  }
}
/* Archive all current recovery data into history, then wipe active */
function archivarYLimpiarRecuperacion(){
  if(!DB.histRecs) DB.histRecs=[];
  if(!DB.histPlanes) DB.histPlanes=[];
  const periodoLabel=`${DB.ext.s} → ${DB.ext.e}`;
  const archivedAt=new Date().toLocaleDateString('es-CO');
  /* Archive recs */
  (DB.recs||[]).forEach(r=>{
    DB.histRecs.push({...r, _periodo:periodoLabel, _archivedAt:archivedAt});
  });
  /* Archive planes */
  (DB.planes||[]).forEach(p=>{
    DB.histPlanes.push({...p, _periodo:periodoLabel, _archivedAt:archivedAt});
  });
  DB.planes=[];DB.recs=[];
  dbSave();
  sw('success','Periodo Extraordinario cerrado',
    `Historial archivado (${DB.histRecs.filter(r=>r._periodo===periodoLabel).length} recuperaciones, ${DB.histPlanes.filter(p=>p._periodo===periodoLabel).length} planes).`,3000);
}
/* Called from old code path — alias */
function limpiarPeriodoRecuperacion(){ archivarYLimpiarRecuperacion(); }
/* Returns true if today is AFTER ext.e (period expired) */
function extExpirado(){
  if(!DB.ext.e) return false;
  return new Date().toISOString().slice(0,10)>DB.ext.e;
}

  const per=gi('expSPer')?.value||'TODOS';
  const anno=gi('expSAnno')?.value||String(new Date().getFullYear());
  /* Download sequentially with small delay to avoid browser throttle */
  let i=0;

    if(i>=ests.length)return;

    i++;setTimeout(next,2000);
  }
  sw('info',`Descargando ${ests.length} boletín(es)...`,`Se descargarán uno a uno con pausa entre cada uno.`);

/* ============================================================
   PROFESOR — INFORME EXCEL
============================================================ */
function dlRptXls(salon,per,matFilter){
  const ests=ebySalon(salon);
  if(!ests.length){sw('info','Sin datos','No hay estudiantes en este salón.');return;}
  let mats=CU.ciclo==='bachillerato'?getProfMatsSalon(CU.id,salon):getMats(ests[0]?.id||'');
  if(matFilter) mats=[matFilter];
  const fechaGen=new Date().toLocaleDateString('es-CO');
  const wb=XLSX.utils.book_new();

  /* ── Hoja 1: Definitivas ── */
  const defRows=[];
  /* Header */
  const hdr=['Estudiante','T.I.','Salón'];
  mats.forEach(m=>hdr.push(m+' — Definitiva'));
  hdr.push('Promedio Periodo','Disciplina');
  defRows.push(hdr);
  ests.forEach(e=>{
    syncN(e.id);
    const row=[e.nombre,e.ti||'',e.salon||''];
    mats.forEach(m=>row.push(def(DB.notas[e.id]?.[per]?.[m]||{a:0,c:0,r:0})));
    row.push(pprom(e.id,per));
    row.push(DB.notas[e.id]?.disciplina||'—');
    defRows.push(row);
  });
  /* Totals row */
  const promGrupo=ests.reduce((s,e)=>s+pprom(e.id,per),0)/ests.length;
  const totRow=['PROMEDIO GRUPO','',''];
  mats.forEach(m=>{
    const avg=ests.reduce((s,e)=>s+def(DB.notas[e.id]?.[per]?.[m]||{a:0,c:0,r:0}),0)/ests.length;
    totRow.push(+avg.toFixed(2));
  });
  totRow.push(+promGrupo.toFixed(2),'');
  defRows.push(totRow);

  const wsD=XLSX.utils.aoa_to_sheet(defRows);
  /* Column widths */
  wsD['!cols']=[{wch:28},{wch:14},{wch:10},...mats.map(()=>({wch:20})),{wch:18},{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsD,`${per} — Definitivas`);

  /* ── Hoja 2: Tripartita completa ── */
  const triRows=[];
  const hdr2=['Estudiante','T.I.'];
  mats.forEach(m=>{hdr2.push(`${m} Apt.60%`,`${m} Act.20%`,`${m} Res.20%`,`${m} Def.`);});
  hdr2.push('Promedio','Disciplina');
  triRows.push(hdr2);
  ests.forEach(e=>{
    syncN(e.id);
    const row=[e.nombre,e.ti||''];
    mats.forEach(m=>{
      const t=DB.notas[e.id]?.[per]?.[m]||{a:0,c:0,r:0};
      const d=def(t);
      row.push(t.a,t.c,t.r,+d.toFixed(2));
    });
    row.push(+pprom(e.id,per).toFixed(2));
    row.push(DB.notas[e.id]?.disciplina||'—');
    triRows.push(row);
  });
  const wsT=XLSX.utils.aoa_to_sheet(triRows);
  wsT['!cols']=[{wch:28},{wch:14},...mats.flatMap(()=>[{wch:12},{wch:12},{wch:12},{wch:12}]),{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsT,`${per} — Tripartita`);

  /* ── Hoja 3: Info del reporte ── */
  const infoRows=[
    ['REPORTE DOCENTE — INFORME DE CALIFICACIONES'],[''],
    ['Profesor:',CU.nombre],
    ['T.I./CC:',CU.ti||'—'],
    ['Ciclo:',CU.ciclo==='bachillerato'?'Bachillerato (6°–11°)':'Primaria (1°–5°)'],
    ['Materias reportadas:',mats.join(', ')||'Todas las del salón'],
    ['Salón:',salon],
    ['Periodo:',per],
    ['Total estudiantes:',ests.length],
    ['Promedio del grupo:',+promGrupo.toFixed(2)],
    ['Fecha de generación:',fechaGen],
  ];
  const wsI=XLSX.utils.aoa_to_sheet(infoRows);
  wsI['!cols']=[{wch:26},{wch:40}];
  XLSX.utils.book_append_sheet(wb,wsI,'Info');

  XLSX.writeFile(wb,`informe_${salon}_${per.replace(/\s+/g,'_')}_${CU.nombre.replace(/\s+/g,'_')}.xlsx`);
  sw('success','Excel descargado','',1500);
}

function getPTarList(){
  const todas=[];
  Object.values(DB.ups||{}).forEach(lista=>{
    lista.forEach(u=>{if(u.profId===CU.id) todas.push(u);});
  });
  return todas.sort((a,b)=>(b.id||'').localeCompare(a.id||''));
}
function abrirArchivo(idx){
  const lista=getPTarList();
  const u=lista[idx];if(!u||!u.dataUrl){sw('error','Archivo no disponible');return;}
  /* Open in new tab */
  const w=window.open();
  if(!w){sw('error','Bloqueo de popups. Permite ventanas emergentes.');return;}
  const isPdf=u.type==='application/pdf';
  const isImg=u.type&&u.type.startsWith('image/');
  if(isPdf||isImg){
    w.document.write(`<html><head><title>${u.nombre}</title></head>
      <body style="margin:0;background:#222">
      <${isPdf?'embed':'img'} src="${u.dataUrl}" style="width:100%;height:100vh;${isPdf?'':'max-height:100vh;object-fit:contain'}" 
        ${isPdf?'type="application/pdf"':''}></${isPdf?'embed':'img'}>
      </body></html>`);
  } else {
    /* For word/excel: trigger download */
    const a=w.document.createElement('a');
    a.href=u.dataUrl;a.download=u.nombre;
    w.document.body.appendChild(a);a.click();
    w.close();
  }
}

  Object.values(DB.ups||{}).forEach(lista=>{
    lista.forEach(u=>{if(u.id===upId){u.revisado=true;u.revisadoTs=new Date().toLocaleDateString('es-CO');found=true;}});

  if(found){dbSave();goto('ptar');sw('success','Tarea marcada como revisada','',1200);}

/* Professor: delete a taller — only if revisado; if not, log to audit */
function eliminarTallerProf(upId){
  let u=null,estId=null;
  Object.entries(DB.ups||{}).forEach(([eid,lista])=>{
    const found=lista.find(x=>x.id===upId);if(found){u=found;estId=eid;}
  });
  if(!u){sw('error','Taller no encontrado');return;}
  if(!u.revisado){
    /* Log unauthorized attempt to audit */
    logAudit('Intento de eliminar taller sin revisar',
      `Profesor: ${CU.nombre} | Taller: ${u.nombre} | Estudiante: ${u.estNombre} | Materia: ${u.materia}`);
    sw('warning','No puedes eliminar este taller sin haberlo revisado primero. El intento fue registrado en auditoría.');
    return;
  }
  Swal.fire({title:'¿Eliminar taller?',text:`"${u.nombre}" de ${u.estNombre} — se eliminará de tu bandeja.`,
    icon:'warning',showCancelButton:true,confirmButtonColor:'#e53e3e',
    confirmButtonText:'Sí, eliminar',cancelButtonText:'Cancelar'
  }).then(r=>{
    if(!r.isConfirmed)return;
    DB.ups[estId]=DB.ups[estId].filter(x=>x.id!==upId);
    dbSave();goto('ptar');sw('success','Taller eliminado','',1200);
  });
}

  const misSalones=CU.salones||[];
  /* Find all students in my salons who lost a subject I teach */
  const elegibles=[];
  misSalones.forEach(salon=>{
    const matsProf=getProfMatsSalon(CU.id,salon);
    ebySalon(salon).forEach(est=>{
      const mp=matPerd(est.id);
      const misMateriasPerdidas=mp.filter(m=>matsProf.includes(m)||(CU.ciclo==='primaria'&&mp.length));
      if(misMateriasPerdidas.length>=1&&misMateriasPerdidas.length<=2){
        misMateriasPerdidas.forEach(mat=>{
          const planYaEnviado=(DB.planes||[]).find(p=>p.estId===est.id&&p.materia===mat&&p.profId===CU.id);
          elegibles.push({est,mat,salon,planYaEnviado:planYaEnviado||null});

    const planesGrupo=(DB.planes||[]).filter(p=>p.salon===salon&&p.profId===CU.id&&p.esSalon);

      ${planesGrupo.length?`<div style="margin-bottom:10px">

          <strong>${pl.titulo}</strong>
          ${pl.archNombre?`<span style="margin-left:8px;color:var(--sl3)">📎 ${pl.archNombre}</span>`:''}
          <span style="margin-left:8px;color:var(--sl3)">📅 ${pl.fechaLimite||DB.ext.e||'—'}</span>

          const planesInd=(DB.planes||[]).filter(p=>p.estId===est.id&&p.materia===mat&&p.profId===CU.id&&!p.esSalon);
          return`<tr>

        <div style="font-size:11px;color:#856404;margin-top:2px">Definida por el administrador (fin del periodo extraordinario)</div>
      </div>
    </div>`,
    showCancelButton:true,
    confirmButtonText:'📤 Enviar Plan',cancelButtonText:'Cancelar',confirmButtonColor:'var(--nv)',
    didOpen:()=>{/* store ref to file input */window._planFileInput=gi(inputId);},
    preConfirm:()=>{
      const t=gi('planTitulo').value.trim(),d=gi('planDesc').value.trim();

      return{titulo:t,desc:d,fechaLimite};

/* Send plan to entire salon */
function abrirEnviarPlanSalon(salon,matsStr){
  const mats=matsStr.split('|').filter(Boolean);
  const existing=(DB.planes||[]).filter(p=>p.salon===salon&&p.profId===CU.id&&p.esSalon);
  const last=existing.length?existing[existing.length-1]:null;
  _planDialog({
    titulo:last?.titulo||'',desc:last?.desc||'',
    archNombre:last?.archNombre||'',archDataUrl:last?.archDataUrl||'',archType:last?.archType||'',
    existing:last,
    destinatario:`<strong>Para todo el Salón ${salon}</strong> · Materias: ${mats.map(m=>`<span class="bdg brd" style="font-size:10px">${m}</span>`).join(' ')}`,
    onConfirm(vals){
      if(!DB.planes) DB.planes=[];
      /* Get all students in salon who need this prof's recovery */
      const matsProf=getProfMatsSalon(CU.id,salon);
      const estudiantesDestino=ebySalon(salon).filter(est=>{
        const mp=matPerd(est.id);
        return mp.some(m=>matsProf.includes(m)||(CU.ciclo==='primaria'));
      });
      const fecha=new Date().toLocaleDateString('es-CO');
      const planId='plan_'+Date.now();
      /* Create one plan entry per student (so each student sees it) */
      estudiantesDestino.forEach((est,idx)=>{
        mats.forEach(mat=>{
          /* Append new plan — keep all previous ones */
          DB.planes.push({
            id:planId+'_'+est.id+'_'+idx,
            estId:est.id,estNombre:est.nombre,salon,
            materia:mat,profId:CU.id,profNombre:CU.nombre,
            titulo:vals.titulo,desc:vals.desc,
            fechaLimite:vals.fechaLimite,
            archNombre:vals.archNombre||'',archDataUrl:vals.archDataUrl||'',archType:vals.archType||'',
            fecha,visto:false,esSalon:true,planId
          });
        });
      });
      dbSave();goto('prec');
      sw('success',`Plan enviado a ${estudiantesDestino.length} estudiante(s) del salón ${salon}`,'',1800);
    }
  });
}

/* Send plan to individual student */
function abrirEnviarPlan(estId,materia,salon){
  const est=DB.ests.find(x=>x.id===estId);if(!est)return;
  const existing=(DB.planes||[]).find(p=>p.estId===estId&&p.materia===materia&&p.profId===CU.id);
  _planDialog({
    titulo:existing?.titulo||'',desc:existing?.desc||'',
    archNombre:existing?.archNombre||'',archDataUrl:existing?.archDataUrl||'',archType:existing?.archType||'',
    existing,
    destinatario:`<strong>${est.nombre}</strong> · <span style="color:#c53030">${materia}</span> · Salón ${salon}`,

      if(!DB.planes) DB.planes=[];

function onFPick(inp){
  if(inp.files[0]) gi('utfn').textContent='📎 '+inp.files[0].name;
}
function subirTarea(){
  const m=gi('utm')?.value,p=gi('utp')?.value,d=gi('utd')?.value.trim();
  const profId=gi('utprof')?.value,f=gi('utf')?.files[0];
  if(!m||!p){sw('warning','Selecciona materia y periodo');return;}
  if(!f){sw('warning','Selecciona un archivo');return;}
  const MAX_MB=5;
  if(f.size>MAX_MB*1024*1024){sw('error',`Archivo muy grande (máx ${MAX_MB} MB)`);return;}
  const prof=DB.profs.find(x=>x.id===profId);
  const reader=new FileReader();
  reader.onload=ev=>{
    if(!DB.ups[CU.id]) DB.ups[CU.id]=[];
    DB.ups[CU.id].push({
      id:'up_'+Date.now(),nombre:f.name,materia:m,periodo:p,
      profId:profId||'',profNombre:prof?prof.nombre:'Sin asignar',
      desc:d,fecha:new Date().toLocaleDateString('es-CO'),
      size:f.size,estId:CU.id,estNombre:CU.nombre,
      type:f.type,dataUrl:ev.target.result  /* store file for opening */
    });
    dbSave();goto('etare');sw('success','Archivo enviado al profesor','',1400);
  };
  reader.onerror=()=>sw('error','Error al leer el archivo');
  reader.readAsDataURL(f);
}
/* Student: delete a taller — only if revisado */
function eliminarTallerEst(upId){
  const lista=DB.ups[CU.id]||[];
  const u=lista.find(x=>x.id===upId);
  if(!u){sw('error','Taller no encontrado');return;}
  if(!u.revisado){sw('warning','Solo puedes eliminar talleres ya revisados por el docente');return;}
  Swal.fire({title:'¿Eliminar taller?',text:`"${u.nombre}" — esta acción no se puede deshacer.`,
    icon:'warning',showCancelButton:true,confirmButtonColor:'#e53e3e',
    confirmButtonText:'Sí, eliminar',cancelButtonText:'Cancelar'
  }).then(r=>{
    if(!r.isConfirmed)return;
    DB.ups[CU.id]=lista.filter(x=>x.id!==upId);
    dbSave();goto('etare');sw('success','Taller eliminado del historial','',1200);
  });
}
/* Student: delete a recovery reply — only if revisado AND period not expired (must have responded) */
function eliminarRecEst(recId){
  const r=(DB.recs||[]).find(x=>x.id===recId&&x.estId===CU.id);
  if(!r){sw('error','Recuperación no encontrada');return;}
  if(!r.revisado){sw('warning','Solo puedes eliminar recuperaciones ya revisadas por el docente');return;}
  Swal.fire({title:'¿Eliminar esta recuperación?',text:'El registro se eliminará de tu historial.',
    icon:'warning',showCancelButton:true,confirmButtonColor:'#e53e3e',
    confirmButtonText:'Sí, eliminar',cancelButtonText:'Cancelar'
  }).then(res=>{
    if(!res.isConfirmed)return;
    DB.recs=DB.recs.filter(x=>x.id!==recId);
    dbSave();goto('ereh');sw('success','Eliminado del historial','',1200);
  });
}

function pgEReh(){

  (DB.planes||[]).filter(p=>p.estId===e.id&&!p.visto).forEach(p=>{p.visto=true;planesChanged=true;});
  if(planesChanged) dbSave();

  const periodoVencido=extExpirado();

  const tarjetas=mp.map(m=>{
    const prf=profForMat(m,e.salon);
    const planesMat=(DB.planes||[]).filter(p=>p.estId===e.id&&p.materia===m).slice().reverse();
    const hayPlanes=planesMat.length>0;

    return`<div class="card" style="border-left:4px solid ${hayPlanes?'var(--grn)':'var(--red)'}">
      <div class="chd">
        <span class="cti">📚 ${m}</span>

        <span style="font-size:12px;color:var(--sl2)">Periodo Extraordinario: ${DB.ext.s} → ${DB.ext.e}</span>
      </div>

      ${hayPlanes
        ?planesMat.map((plan,pi)=>{
          const respuestas=(DB.recs||[]).filter(r=>r.estId===e.id&&r.planId===plan.id);
          const ultimaResp=respuestas.length?respuestas[respuestas.length-1]:null;

/* Submit a reply linked to a specific plan */
function subirRecPlan(planId,materia,profId){
  const key=planId.replace(/[^a-z0-9]/gi,'_');
  const desc=gi('rdesc_'+key)?.value.trim();
  const f=gi('rf_'+key)?.files[0];
  if(!f){sw('warning','Selecciona un archivo para enviar');return;}
  if(f.size>5*1024*1024){sw('error','Archivo muy grande (máx 5 MB)');return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    if(!DB.recs) DB.recs=[];
    DB.recs.push({
      id:'rec_'+Date.now(),
      estId:CU.id,estNombre:CU.nombre,salon:CU.salon||'',
      materia,profId,planId,
      nombre:f.name,type:f.type,dataUrl:ev.target.result,
      desc:desc||'',fecha:new Date().toLocaleDateString('es-CO'),
      revisado:false,ts:new Date().toISOString()
    });
    dbSave();goto('ereh');sw('success','Respuesta enviada al docente','',1500);
  };
  reader.onerror=()=>sw('error','Error al leer el archivo');
  reader.readAsDataURL(f);
}

/* Open the file attached to a recovery plan */
function abrirArchivoPlan(planId){
  /* Find plan by id (planId may be a prefix for group plans) */
  const plan=(DB.planes||[]).find(p=>p.id===planId||p.planId===planId);
  if(!plan||!plan.archDataUrl){sw('error','Archivo no disponible');return;}
  const w=window.open();if(!w){sw('error','Permite ventanas emergentes');return;}
  const isPdf=plan.archType==='application/pdf';
  const isImg=plan.archType?.startsWith('image/');
  if(isPdf||isImg){
    w.document.write(`<html><head><title>${plan.archNombre}</title></head>
      <body style="margin:0;background:#222">
      <${isPdf?'embed':'img'} src="${plan.archDataUrl}" style="width:100%;height:100vh" ${isPdf?'type="application/pdf"':''}></${isPdf?'embed':'img'}>
      </body></html>`);
  } else {
    const a=w.document.createElement('a');
    a.href=plan.archDataUrl;a.download=plan.archNombre;
    w.document.body.appendChild(a);a.click();w.close();
  }
}

/**
 * Main PDF generator
 * perFilter: 'TODOS' | encoded period name
 * anno: year string
 */
function dlBoletin(estId,perFilter,anno){
  perFilter=perFilter||'TODOS';anno=anno||String(new Date().getFullYear());
  const e=DB.ests.find(x=>x.id===estId);
  if(!e){sw('error','Estudiante no encontrado');return;}
  syncN(estId);

  const isTodos=perFilter==='TODOS';
  const pers2render=isTodos?DB.pers:DB.pers.filter(p=>p===decodeURIComponent(perFilter));
  if(!pers2render.length){sw('error','Periodo no encontrado');return;}
  const mats=getMats(estId);
  const cicloLabel=cicloOf(e.salon)==='primaria'?'Primaria (1°-5°)':'Bachillerato (6°-11°)';

  /* Check data */
  let hasData=false;
  pers2render.forEach(per=>{
    mats.forEach(m=>{const t=DB.notas[estId]?.[per]?.[m];if(t&&(t.a>0||t.c>0||t.r>0))hasData=true;});
  });
  if(!hasData){sw('info','Sin datos',`No hay notas ingresadas para ${isTodos?'ningún periodo':'este periodo'}. Consulta con tu profesor o administrador.`);return;}

  const pg=gprom(estId),ps=puestoS(estId),mp=matPerd(estId);
  const box=gi('pdfBox');
  const suffix=isTodos?'todos_periodos':decodeURIComponent(perFilter).replace(/\s+/g,'_');
  const fechaGen=new Date().toLocaleDateString('es-CO',{year:'numeric',month:'long',day:'numeric'});
  const subtitle=isTodos?`Año Lectivo ${anno} — Todos los Periodos`:`Año Lectivo ${anno} — ${decodeURIComponent(perFilter)}`;

  /* Build period tables */
  const persHTML=pers2render.map(per=>{
    const pp=pprom(estId,per),ppu=puestoP(estId,per);
    const periodoTieneData=mats.some(m=>{const t=DB.notas[estId]?.[per]?.[m];return t&&(t.a>0||t.c>0||t.r>0);});
    if(!periodoTieneData&&isTodos) return`<div style="padding:8px 0;color:#718096;font-style:italic;font-size:12px">· ${per}: Sin notas registradas</div>`;

    if(isTodos){
      /* Compact: only definitivas + subjects + professor */
      return`<div style="margin-bottom:16px;page-break-inside:avoid">
        <div style="background:#1a3a5c;color:#fff;padding:8px 12px;border-radius:6px 6px 0 0;display:flex;justify-content:space-between;align-items:center">
          <strong style="font-size:13px">${per}</strong>
          <span style="font-size:11px;opacity:.8">Promedio: ${pp.toFixed(2)} &nbsp;|&nbsp; Puesto: ${ppu}°</span>
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead><tr>
            <th style="background:#2d5286;color:#fff;padding:6px 9px;text-align:left">Materia</th>
            <th style="background:#2d5286;color:#fff;padding:6px 9px;text-align:center">Definitiva</th>
            <th style="background:#2d5286;color:#fff;padding:6px 9px;text-align:center">Estado</th>
            <th style="background:#2d5286;color:#fff;padding:6px 9px;text-align:left">Profesor(a)</th>
          </tr></thead>
          <tbody>${mats.map((m,idx)=>{
            const d=def(DB.notas[estId]?.[per]?.[m]||{a:0,c:0,r:0});
            const prf=profForMat(m,e.salon);
            return`<tr style="background:${idx%2===0?'#f7fafc':'#fff'}">
              <td style="padding:6px 9px;border-bottom:1px solid #e2e8f0">${m}</td>
              <td style="padding:6px 9px;border-bottom:1px solid #e2e8f0;text-align:center;font-weight:800;color:${scCol(d)}">${d.toFixed(2)}</td>
              <td style="padding:6px 9px;border-bottom:1px solid #e2e8f0;text-align:center;color:${d===0?'#a0aec0':d>=3?'#276749':'#c53030'};font-weight:600">${d===0?'Sin nota':d>=3?'✓ Aprobado':'✗ Reprobado'}</td>
              <td style="padding:6px 9px;border-bottom:1px solid #e2e8f0;font-size:11px;color:#4a5568">${prf?prf.nombre:'Sin asignar'}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>`;
    } else {
      /* Detailed: full tripartita breakdown */
      return`<div style="margin-bottom:18px;page-break-inside:avoid">
        <div style="background:#1a3a5c;color:#fff;padding:8px 12px;border-radius:6px 6px 0 0;display:flex;justify-content:space-between;align-items:center">
          <strong style="font-size:13px">${per}</strong>

        </div>
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead><tr>
            <th style="background:#2d5286;color:#fff;padding:6px 9px;text-align:left">Materia</th>
            <th style="background:#1e6b5c;color:#fff;padding:6px 9px;text-align:center;font-size:10px">Aptitud<br><span style="opacity:.7">(60%)</span></th>
            <th style="background:#2d5286;color:#fff;padding:6px 9px;text-align:center;font-size:10px">Actitud<br><span style="opacity:.7">(20%)</span></th>
            <th style="background:#2d5286;color:#fff;padding:6px 9px;text-align:center;font-size:10px">Respons.<br><span style="opacity:.7">(20%)</span></th>

            <th style="background:#2d5286;color:#fff;padding:6px 9px;text-align:left;font-size:10px">Profesor(a)</th>
          </tr></thead>
          <tbody>${mats.map((m,idx)=>{
            const t=DB.notas[estId]?.[per]?.[m]||{a:0,c:0,r:0};const d=def(t);
            const prf=profForMat(m,e.salon);
            return`<tr style="background:${idx%2===0?'#f7fafc':'#fff'}">
              <td style="padding:6px 9px;border-bottom:1px solid #e2e8f0;font-weight:600">${m}</td>
              <td style="padding:6px 9px;border-bottom:1px solid #e2e8f0;text-align:center;color:#276749;font-weight:600">${t.a.toFixed(1)}</td>
              <td style="padding:6px 9px;border-bottom:1px solid #e2e8f0;text-align:center;color:#744210;font-weight:600">${t.c.toFixed(1)}</td>
              <td style="padding:6px 9px;border-bottom:1px solid #e2e8f0;text-align:center;color:#2b6cb0;font-weight:600">${t.r.toFixed(1)}</td>
              <td style="padding:6px 9px;border-bottom:1px solid #e2e8f0;text-align:center;font-weight:900;font-size:13px;color:${scCol(d)}">${d.toFixed(2)}</td>

     </div>`:'' ;

  box.innerHTML=`<div style="font-family:'Outfit',sans-serif;background:#fff;max-width:760px">
    <!-- HEADER -->
    <div style="background:linear-gradient(135deg,#0b1e33 0%,#1a3a5c 100%);color:#fff;padding:24px 28px;position:relative;overflow:hidden">

      <div style="font-size:10px;text-transform:uppercase;letter-spacing:.15em;opacity:.55;margin-bottom:6px">EduSistema Pro · Documento Oficial</div>
      <h1 style="font-size:20px;font-weight:900;margin-bottom:4px;letter-spacing:-.3px">BOLETÍN DE CALIFICACIONES</h1>
      <p style="font-size:11px;opacity:.65">${subtitle} · Emitido: ${fechaGen}</p>
    </div>
    <!-- STUDENT INFO -->
    <div style="background:#eef2f7;padding:14px 28px;display:grid;grid-template-columns:1fr 1fr;gap:10px;border-bottom:2px solid #d8e2ef">

        <div style="font-size:12px;line-height:1.8"><strong>T.I.:</strong> ${e.ti||'No registrado'}</div>

          ?`<div style="font-size:12px;line-height:1.8"><strong>Promedio General:</strong> <span style="color:${scCol(pg)};font-weight:900;font-size:16px">${pg.toFixed(2)}</span></div>
             <div style="font-size:12px;line-height:1.8"><strong>Puesto en Salón:</strong> <strong>${ps}°</strong></div>`

    <!-- GRADES -->

  box.classList.remove('hidden');
